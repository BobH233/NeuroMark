name: build-electron

on:
  workflow_dispatch:
  push:
    branches:
      - dev-windows-ci

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runs_on: windows-2022
            artifact_name: neuromark-electron-windows
            cmake_parallel_level: '3'

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CMAKE_BUILD_PARALLEL_LEVEL: ${{ matrix.cmake_parallel_level }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Windows Node.js headers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeVersion = node -p "process.versions.node"
          $devDir = Join-Path $env:LOCALAPPDATA "node-gyp\Cache"
          $nodeLibDir = Join-Path (Join-Path $devDir $nodeVersion) "x64"
          npm exec --yes --package=node-gyp@latest -- node-gyp install --target=$nodeVersion --devdir="$devDir"
          "npm_config_nodedir=$devDir\$nodeVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_API_INCLUDE_DIR_HINT=$devDir\$nodeVersion\include\node" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_LIBRARY_HINT=$nodeLibDir\node.lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore Electron and native build caches
        uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            build/native
          key: ${{ runner.os }}-${{ runner.arch }}-node22-native-v2-${{ hashFiles('package-lock.json', 'package.json', 'scripts/build-native.mjs', 'src-native/scancpp/CMakeLists.txt', 'src-native/scancpp/src/**', 'src-native/scancpp/third_party/opencv/cmake/**', 'src-native/scancpp/third_party/opencv/CMakeLists.txt') }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build and package Electron app
        run: npm run dist:ci

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/github-actions/**
          if-no-files-found: error
          retention-days: 14

name: build-electron

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            runs_on: ubuntu-24.04
            artifact_name: neuromark-electron-ubuntu
            cmake_parallel_level: '4'
          - name: Windows
            runs_on: windows-2022
            artifact_name: neuromark-electron-windows
            cmake_parallel_level: '3'
          - name: macOS Intel
            runs_on: macos-15-intel
            artifact_name: neuromark-electron-macos-x64
            cmake_parallel_level: '3'
          - name: macOS Apple Silicon
            runs_on: macos-15
            artifact_name: neuromark-electron-macos-arm64
            cmake_parallel_level: '3'

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CMAKE_BUILD_PARALLEL_LEVEL: ${{ matrix.cmake_parallel_level }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Windows Node.js headers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $electronVersion = node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).devDependencies.electron.replace(/^[^0-9]*/, '')"
          $devDir = Join-Path $env:LOCALAPPDATA "node-gyp\Cache"
          $electronLibDir = Join-Path (Join-Path $devDir $electronVersion) "x64"
          npm exec --yes --package=node-gyp@latest -- node-gyp install --target=$electronVersion --runtime=electron --dist-url=https://electronjs.org/headers --devdir="$devDir"
          "npm_config_runtime=electron" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "npm_config_disturl=https://electronjs.org/headers" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "npm_config_target=$electronVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "npm_config_nodedir=$devDir\$electronVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_API_INCLUDE_DIR_HINT=$devDir\$electronVersion\include\node" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_LIBRARY_HINT=$electronLibDir\node.lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore Electron and native build caches
        uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            build/native
          key: ${{ runner.os }}-${{ runner.arch }}-node22-native-v2-${{ hashFiles('package-lock.json', 'package.json', 'scripts/build-native.mjs', 'src-native/scancpp/CMakeLists.txt', 'src-native/scancpp/src/**', 'src-native/scancpp/third_party/opencv/cmake/**', 'src-native/scancpp/third_party/opencv/CMakeLists.txt') }}

      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            fakeroot \
            libarchive-tools \
            ninja-build \
            pkg-config \
            rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build and package Electron app
        run: npm run dist:ci

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/github-actions/**
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Select distributable release files
        run: |
          mkdir -p release-assets

          find release-artifacts -type f \
            \( \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.deb' -o \
              -name '*.AppImage' -o \
              -name '*.appimage' \
            \) \
            -exec cp {} release-assets/ \;

          if [ -z "$(find release-assets -maxdepth 1 -type f -print -quit)" ]; then
            echo "No distributable release files were selected."
            exit 1
          fi

          echo "Selected release files:"
          ls -la release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: release-assets/*

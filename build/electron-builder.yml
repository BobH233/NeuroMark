appId: cn.bit-helper.neuromark
productName: NeuroMark
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
asar: true
asarUnpack:
  - node_modules/sharp/**
  - node_modules/@img/sharp-*/**
  - node_modules/@img/sharp-libvips-*/**
extraResources:
  - from: build/native
    to: native
    filter:
      - '**/*'
  - from: src-native/scancpp/models
    to: models
    filter:
      - '*.onnx'
mac:
  category: public.app-category.education
  target:
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - deb
  category: Education

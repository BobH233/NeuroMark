appId: cn.bit-helper.neuromark
productName: NeuroMark
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
asar: true
extraResources:
  - from: build/native
    to: native
    filter:
      - '**/*'
  - from: src-native/scancpp/models
    to: models
    filter:
      - '*.onnx'
mac:
  category: public.app-category.education
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - deb
  category: Education
